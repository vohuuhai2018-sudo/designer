# Render Blueprint config for flow-worker.
# Đặt ở repo root vì Render parse `dockerfilePath` relative tới repo root.
# Docker services KHÔNG honor `rootDir` — phải dùng full path từ repo root.
#
# Workflow:
# 1. Render dashboard → New → Blueprint → connect repo
# 2. Render auto-reads file này
# 3. User paste FLOW_STATE_B64 (output từ `flow-worker/export-state.js`)
# 4. WORKER_SECRET tự generate

services:
  - type: web
    name: flow-worker
    runtime: docker
    plan: free  # 512MB RAM, 0.1 CPU shared, spin down sau 15 phút idle
    dockerfilePath: ./flow-worker/Dockerfile.render
    dockerContext: ./flow-worker
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "10000"
      - key: FLOW_CONCURRENCY
        value: "1"  # Free RAM tight — chỉ 1 page concurrent
      - key: FLOW_HEADLESS
        value: "0"
      - key: DISPLAY
        value: ":99"
      - key: WORKER_SECRET
        generateValue: true  # Render auto-sinh secret
      - key: FLOW_STATE_B64
        sync: false  # User paste manual (output từ export-state.js)
      # Cloudinary creds: worker tự upload ảnh kết quả → giảm payload webhook
      # về Vercel xuống chỉ còn URL JSON (tránh 4.5MB body limit Hobby).
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Webhook auth — phải MATCH Vercel env WEBHOOK_SECRET. Worker gửi header
      # X-Webhook-Auth khi POST result về /api/internal/projects/:id/aiResults.
      - key: WEBHOOK_SECRET
        sync: false
