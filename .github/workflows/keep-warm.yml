# Ping Render Free worker every 13 min để giữ instance khỏi spin-down (Render
# Free idle ~15 min). GitHub Actions cron có jitter ±10 min trên free tier nên
# 13 phút là đệm an toàn.
name: keep-flow-worker-warm

on:
  schedule:
    - cron: '*/13 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: ping /health
        run: |
          URL="${{ vars.FLOW_WORKER_URL || 'https://flow-worker-q7d2.onrender.com' }}"
          for i in 1 2 3; do
            code=$(curl -s -o /tmp/h.json -w "%{http_code}" --max-time 60 "$URL/health" || echo 000)
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              cat /tmp/h.json
              exit 0
            fi
            sleep 5
          done
          echo "❌ /health failed after 3 retries"
          exit 1
