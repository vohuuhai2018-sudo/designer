# Render Blueprint config for flow-worker.
# Đặt ở repo root vì Render parse `dockerfilePath` relative tới repo root, KHÔNG
# phải tới vị trí render.yaml. Dùng `rootDir: flow-worker` để mọi path bên trong
# (Dockerfile.render, dockerContext) resolve về subdir flow-worker/.
#
# Workflow:
# 1. Render dashboard → New → Blueprint → connect repo
# 2. Render auto-reads file này
# 3. User paste FLOW_STATE_B64 (output từ `flow-worker/export-state.js`)
# 4. WORKER_SECRET tự generate

services:
  - type: web
    name: flow-worker
    runtime: docker
    plan: free  # 512MB RAM, 0.1 CPU shared, spin down sau 15 phút idle
    rootDir: flow-worker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "10000"
      - key: FLOW_CONCURRENCY
        value: "1"  # Free RAM tight — chỉ 1 page concurrent
      - key: FLOW_HEADLESS
        value: "0"
      - key: DISPLAY
        value: ":99"
      - key: WORKER_SECRET
        generateValue: true  # Render auto-sinh secret
      - key: FLOW_STATE_B64
        sync: false  # User paste manual (output từ export-state.js)
