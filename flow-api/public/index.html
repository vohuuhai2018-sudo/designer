<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>flow-gen — Google Labs Flow image API</title>
<style>
  :root { --bg:#0b0d10; --fg:#e8e8e8; --accent:#34d399; --muted:#9aa4ad; --card:#15181c; --err:#f87171; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  main { max-width: 760px; margin: 40px auto; padding: 0 20px; }
  h1 { margin:0 0 8px; font-size:22px; }
  .sub { color:var(--muted); margin-bottom:24px; }
  .card { background:var(--card); border-radius:12px; padding:20px; margin-bottom:16px; }
  label { display:block; font-size:12px; color:var(--muted); margin:0 0 4px; }
  textarea, input, select { width:100%; padding:10px 12px; background:#0e1114; color:var(--fg); border:1px solid #232a31; border-radius:8px; font:inherit; }
  textarea { min-height:80px; resize:vertical; }
  .row { display:flex; gap:12px; margin-top:12px; }
  .row > div { flex:1; }
  button { margin-top:16px; padding:10px 16px; background:var(--accent); color:#0b0d10; border:none; border-radius:8px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:wait; }
  .status { margin-top:16px; font-size:13px; color:var(--muted); }
  .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap:12px; margin-top:16px; }
  .grid img { width:100%; border-radius:8px; display:block; }
  pre { background:#0e1114; padding:12px; border-radius:8px; overflow:auto; font-size:12px; }
  code { background:#0e1114; padding:2px 6px; border-radius:4px; }
  .err { color:var(--err); }
</style>
</head>
<body>
<main>
  <h1>flow-gen</h1>
  <div class="sub">Google Labs Flow (Nano Banana 2) image generation — pure API, no UI scraping.</div>

  <div class="card">
    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="a serene Vietnamese countryside at golden hour, photorealistic, cinematic"></textarea>
    <div class="row">
      <div>
        <label for="count">Count</label>
        <input id="count" type="number" value="2" min="1" max="4">
      </div>
      <div>
        <label for="aspect">Aspect</label>
        <select id="aspect">
          <option value="LANDSCAPE">LANDSCAPE 16:9</option>
          <option value="PORTRAIT">PORTRAIT 9:16</option>
          <option value="SQUARE">SQUARE 1:1</option>
        </select>
      </div>
    </div>
    <button id="go">Generate</button>
    <div class="status" id="status"></div>
    <div class="grid" id="out"></div>
  </div>

  <div class="card">
    <h3 style="margin:0 0 8px;font-size:14px">cURL</h3>
    <pre id="curl"></pre>
  </div>
</main>

<script>
const elPrompt = document.getElementById('prompt');
const elCount = document.getElementById('count');
const elAspect = document.getElementById('aspect');
const elGo = document.getElementById('go');
const elStatus = document.getElementById('status');
const elOut = document.getElementById('out');
const elCurl = document.getElementById('curl');

function refreshCurl() {
  const body = JSON.stringify({ prompt: elPrompt.value || '<your prompt>', count: Number(elCount.value), aspect: elAspect.value });
  elCurl.textContent = `curl -X POST ${location.origin}/api/generate \\\n  -H 'content-type: application/json' \\\n  -d '${body}'`;
}
[elPrompt, elCount, elAspect].forEach(el => el.addEventListener('input', refreshCurl));
refreshCurl();

elGo.addEventListener('click', async () => {
  const prompt = elPrompt.value.trim();
  if (!prompt) { elStatus.innerHTML = '<span class="err">Prompt required</span>'; return; }
  elGo.disabled = true;
  elOut.innerHTML = '';
  const t0 = Date.now();
  elStatus.textContent = 'Generating… (cold start ~5s + gen ~30s/image)';
  try {
    const r = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ prompt, count: Number(elCount.value), aspect: elAspect.value }),
    });
    const json = await r.json();
    if (!r.ok) throw new Error(json.error || ('HTTP ' + r.status));
    elStatus.textContent = `Got ${json.received} image(s) in ${json.elapsedMs}ms (total ${Date.now() - t0}ms)`;
    for (const img of (json.images || [])) {
      const a = document.createElement('a');
      a.href = img.url; a.target = '_blank'; a.rel = 'noopener';
      const i = document.createElement('img');
      i.src = img.url; i.alt = prompt; i.loading = 'lazy';
      a.appendChild(i); elOut.appendChild(a);
    }
  } catch (e) {
    elStatus.innerHTML = '<span class="err">Error: ' + e.message + '</span>';
  } finally { elGo.disabled = false; }
});

// Health probe
fetch('/api/generate').then(r => r.json()).then(j => {
  if (j.hasState === false) elStatus.innerHTML = '<span class="err">FLOW_STATE_B64 not set on this deployment</span>';
}).catch(() => {});
</script>
</body>
</html>
